<nav role="navigation" aria-label="Main navigation">
    <div class="container">
        <div class="nav-container">
            <script>
                const wrap = document.getElementById('vinyl-wrap');
                const svg  = document.querySelector('.vinyl-svg');
                let paused = false;

                // desktop hover
                wrap.addEventListener('mouseenter', () => svg.pauseAnimations());
                wrap.addEventListener('mouseleave', () => svg.unpauseAnimations());

                // mobile tap toggle
                wrap.addEventListener('touchstart', (e) => {
                    e.preventDefault(); // prevents ghost mouse events firing after touch
                    if (paused) {
                        svg.unpauseAnimations();
                        paused = false;
                    } else {
                        svg.pauseAnimations();
                        paused = true;
                    }
                });
            </script>
            <div class="vinyl-wrap">
                <defs>
                    <filter id="spin-blur">
                        <feGaussianBlur stdDeviation="3 0"/>
                    </filter>
                </defs>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" class="vinyl-svg" width="200" height="200">
                    <defs>
                        <!-- gloss highlight arc -->
                        <radialGradient id="gloss" cx="40%" cy="35%" r="60%">
                          <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
                          <stop offset="40%"  stop-color="white" stop-opacity="0.04"/>
                          <stop offset="100%" stop-color="white" stop-opacity="0"/>
                        </radialGradient>
                    
                        <!-- subtle dark vignette around the edge -->
                        <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
                          <stop offset="70%"  stop-color="black" stop-opacity="0"/>
                          <stop offset="100%" stop-color="black" stop-opacity="0.5"/>
                        </radialGradient>
                      </defs>
                    <!-- spinning part (rings only) -->
                  <g class="vinyl-spin" filter="url(#spin-blur)">
                    <circle cx="150" cy="140" r="118" fill="#1a1a2e" stroke="#d8c9a8" stroke-width="1"/>
                    <circle cx="150" cy="140" r="110" fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="102" fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="94"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="86"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="78"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="70"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="62"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="54"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <circle cx="150" cy="140" r="46"  fill="none" stroke="#d8c9a8" stroke-width="1.2"/>
                    <!-- all your ring circles here -->
                    <animateTransform
                        attributeName="transform"
                        type="rotate"
                        from="0 150 140"
                        to="360 150 140"
                        dur="4s"
                        repeatCount="indefinite"/>
                  </g>
            
                  <!-- center label stays fixed -->
                  <circle cx="150" cy="140" r="38" fill="rgba(26, 26, 46, .95)"/>
                  <text x="150" y="148" text-anchor="middle"
                        font-family="Georgia, serif"
                        font-size="20" font-style="italic" fill="#d8c9a8"
                        letter-spacing="1">1979</text>
            
                        <!-- gloss layer — sits on top, does not spin -->
                    <circle cx="150" cy="140" r="118" fill="url(#gloss)" pointer-events="none"/>
                    <!-- vignette layer -->
                    <circle cx="150" cy="140" r="118" fill="url(#vignette)" pointer-events="none"/>
                </svg>
            </div>
            <a href="{{ .Site.BaseURL }}" class="logo" aria-label="{{ .Site.Title }} - Home">{{ .Site.Params.logo | default "GP" }}</a>
            <ul class="nav-links" id="nav-menu">
                <li><a href="{{ .Site.BaseURL }}" aria-current="false">{{ i18n "home" }}</a></li>
                <li><a href="{{ .Site.BaseURL }}social/" aria-current="false">{{ i18n "social" }}</a></li>
                <li><a href="{{ .Site.BaseURL }}posts/" aria-current="false">{{ i18n "blog" }}</a></li>
                <li><a href="{{ .Site.BaseURL }}portfolio/" aria-current="false">{{ i18n "portfolio" }}</a></li>
                <li><a href="{{ .Site.BaseURL }}about/" aria-current="false">{{ i18n "about" }}</a></li>
                <li><a href="{{ .Site.BaseURL }}travel/" aria-current="false">{{ i18n "travel" }}</a></li>
            </ul>
            <div class="lang-switcher" role="group" aria-label="Language selection">
                {{ range .Site.Languages }}
                <a href="{{ if eq .Lang "zh" }}{{ $.Site.BaseURL }}{{ else }}{{ $.Site.BaseURL }}{{ .Lang }}/{{ end }}" 
                   class="lang-link {{ if eq .Lang $.Site.Language.Lang }}active{{ end }}" 
                   aria-label="Switch to {{ .LanguageName }}" 
                   {{ if eq .Lang $.Site.Language.Lang }}aria-current="true"{{ end }}>{{ .Lang | upper }}</a>
                {{ end }}
            </div>
            <button class="mobile-menu-btn" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation menu">☰</button>
        </div>
    </div>
</nav>
